name: Release @qute/core

on:
  push:
    branches: [main]
    paths:
      - packages/core/package.json

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: version
        run: |
          CURRENT=$(node -p "require('./packages/core/package.json').version")
          PREVIOUS=$(git show HEAD~1:packages/core/package.json | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version" || echo "none")
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - uses: pnpm/action-setup@v4
        if: steps.version.outputs.changed == 'true'
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        if: steps.version.outputs.changed == 'true'
        with:
          node-version: '23'
          cache: 'pnpm'

      - name: Install and build
        if: steps.version.outputs.changed == 'true'
        run: pnpm install --frozen-lockfile && pnpm --filter @qute/core build

      - name: Commit build
        if: steps.version.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add qute.js qute.js.map
          git diff --staged --quiet || git commit -m "build: @qute/core@${{ steps.version.outputs.current }}"
          git push

      - name: Create release
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="core-${{ steps.version.outputs.current }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes
