name: Release @qute/preload

on:
  push:
    branches: [main]
    paths:
      - packages/preload/package.json

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version changed
        id: version
        run: |
          CURRENT=$(node -p "require('./packages/preload/package.json').version")
          PREVIOUS=$(git show HEAD~1:packages/preload/package.json | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version" || echo "none")
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - uses: pnpm/action-setup@v4
        if: steps.version.outputs.changed == 'true'
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        if: steps.version.outputs.changed == 'true'
        with:
          node-version: '23'
          cache: 'pnpm'

      - name: Install and build
        if: steps.version.outputs.changed == 'true'
        run: pnpm install --frozen-lockfile && pnpm --filter @qute/preload build

      - name: Publish to releases branch
        if: steps.version.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cp preload.js /tmp/preload.js
          cp preload.js.map /tmp/preload.js.map

          if git ls-remote --exit-code origin releases > /dev/null 2>&1; then
            git checkout releases
          else
            git checkout --orphan releases
            git rm -rf . --quiet 2>/dev/null || true
          fi

          cp /tmp/preload.js preload.js
          cp /tmp/preload.js.map preload.js.map

          git add preload.js preload.js.map
          git diff --staged --quiet || git commit -m "build: @qute/preload@${{ steps.version.outputs.current }}"
          git push origin releases

      - name: Create release
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="preload-${{ steps.version.outputs.current }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --target $(git rev-parse HEAD) \
            --generate-notes
