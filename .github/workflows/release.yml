name: Release

on:
  push:
    branches: [main]
    paths:
      - packages/core/package.json

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version changed
        id: version
        run: |
          CURRENT=$(node -p "require('./packages/core/package.json').version")
          PREVIOUS=$(git show HEAD~1:packages/core/package.json | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version" || echo "none")
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - uses: pnpm/action-setup@v4
        if: steps.version.outputs.changed == 'true'
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        if: steps.version.outputs.changed == 'true'
        with:
          node-version: '23'
          cache: 'pnpm'

      - name: Install and build
        if: steps.version.outputs.changed == 'true'
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @qute/core build
          pnpm --filter @qute/morph build
          pnpm --filter @qute/preload build

      - name: Publish to releases branch
        if: steps.version.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cp -r dist /tmp/dist

          if git ls-remote --exit-code origin releases > /dev/null 2>&1; then
            git checkout releases
          else
            git checkout --orphan releases
            git rm -rf . --quiet 2>/dev/null || true
          fi

          cp /tmp/dist/* .

          git add .
          git diff --staged --quiet || git commit -m "release: ${{ steps.version.outputs.current }}"
          git push origin releases

      - name: Create release
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.current }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --target $(git rev-parse HEAD) \
            --generate-notes
