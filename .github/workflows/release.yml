name: Release

on:
  push:
    branches: [main]
    paths:
      - packages/core/package.json

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version changed
        id: version
        run: |
          CURRENT=$(node -p "require('./packages/core/package.json').version")
          PREVIOUS=$(git show HEAD~1:packages/core/package.json | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version" || echo "none")
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - uses: pnpm/action-setup@v4
        if: steps.version.outputs.changed == 'true'
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        if: steps.version.outputs.changed == 'true'
        with:
          node-version: '23'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install and build
        if: steps.version.outputs.changed == 'true'
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @erikt/ajax build

      - name: Publish to npm
        if: steps.version.outputs.changed == 'true'
        run: pnpm --filter @erikt/ajax publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.current }}" \
            --title "${{ steps.version.outputs.current }}" \
            --generate-notes
